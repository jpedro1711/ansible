---
- name: Basic system setup
  hosts: all
  become: true
  tasks:
    - name: Update all packages
      ansible.builtin.package:
        name: '*'
        state: "{{ package_state }}"
    
    - name: Create a new user
      ansible.builtin.user:
        name: "{{ item }}"
        state: present
        create_home: true
      loop:
        - alice
        - bob

    - name: Install apache on server
      ansible.builtin.package:
        name: "{{ package_name }}"
        state: present
      when: inventory_hostname in groups['web']

    - name: Install firewalld
      ansible.builtin.package:
        name: firewalld
        state: present
        update_cache: yes
      when: inventory_hostname in groups['web']

    - name: Ensure firewalld is running
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true
      when: inventory_hostname in groups['web']

    - name: Allow HTTP Traffic on web server
      ansible.posix.firewalld:
        service: http
        permanent: true
        immediate: true
        state: enabled
      when: inventory_hostname in groups['web']
      notify: Reload firewall

  handlers:
    - name: Reload firewall
      ansible.posix.firewalld:
        name: firewalld
        state: enabled
